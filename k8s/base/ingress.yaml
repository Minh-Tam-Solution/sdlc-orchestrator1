---
# =========================================================================
# Ingress - External HTTPS Access to SDLC Orchestrator API
# SDLC Orchestrator - Stage 03 (BUILD) - Week 9 Day 1
#
# Version: 1.0.0
# Date: December 16, 2025
# Status: ACTIVE - Week 9 Day 1 Kubernetes Deployment
# Authority: DevOps Lead + Security Lead + CTO Approved
# Foundation: NGINX Ingress Controller, cert-manager (Let's Encrypt)
# Framework: SDLC 4.9 Complete Lifecycle
#
# Purpose:
# - HTTPS external access to FastAPI backend
# - TLS termination (Let's Encrypt certificates)
# - Path-based routing (/api/v1/* → backend:8000)
# - Rate limiting (100 req/min per IP)
#
# Prerequisites:
# - NGINX Ingress Controller installed in cluster
# - cert-manager installed for automatic TLS certificate management
# - DNS record pointing to LoadBalancer IP
#
# Zero Mock Policy: Production-ready Ingress configuration
# =========================================================================

---
# Ingress for SDLC Orchestrator API
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sdlc-orchestrator-ingress
  namespace: sdlc-orchestrator
  labels:
    app.kubernetes.io/name: ingress
    app.kubernetes.io/instance: sdlc-orchestrator-ingress
    app.kubernetes.io/component: network
    app.kubernetes.io/part-of: sdlc-orchestrator-platform

  annotations:
    # NGINX Ingress Controller
    kubernetes.io/ingress.class: "nginx"

    # TLS Certificate (cert-manager Let's Encrypt)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # HTTPS Redirect
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # Rate Limiting (100 requests/minute per IP)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"

    # CORS (handled by FastAPI, but backup at ingress level)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"

    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

    # Body Size Limit (50MB for evidence file uploads)
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

    # WebSocket Support (for real-time dashboard updates - future)
    nginx.ingress.kubernetes.io/websocket-services: "backend"

    # Security Headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";

spec:
  tls:
    - hosts:
        - api.sdlc-orchestrator.com  # CHANGE TO YOUR DOMAIN
      secretName: sdlc-orchestrator-tls

  rules:
    - host: api.sdlc-orchestrator.com  # CHANGE TO YOUR DOMAIN
      http:
        paths:
          # API Routes (all /api/v1/* endpoints)
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000

          # Health Check Endpoint
          - path: /health
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8000

          # Metrics Endpoint (restrict access in production)
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8000

          # OpenAPI Documentation
          - path: /docs
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8000

          - path: /redoc
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8000

          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8000

---
# ClusterIssuer for Let's Encrypt (cert-manager)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: sdlc-orchestrator

spec:
  acme:
    # Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory

    # Email for certificate expiration notifications
    email: devops@mtc.com.vn  # CHANGE TO YOUR EMAIL

    # Private key secret
    privateKeySecretRef:
      name: letsencrypt-prod-key

    # ACME HTTP-01 challenge
    solvers:
      - http01:
          ingress:
            class: nginx
