---
# =========================================================================
# OPA (Open Policy Agent) Deployment - Policy-as-Code Engine
# SDLC Orchestrator - Stage 03 (BUILD) - Week 9 Day 1
#
# Version: 1.0.0
# Date: December 16, 2025
# Status: ACTIVE - Week 9 Day 1 Kubernetes Deployment
# Authority: DevOps Lead + Backend Lead + CTO Approved
# Foundation: OPA 0.58.0 (Apache-2.0 License), Deployment for stateless policy evaluation
# Framework: SDLC 4.9 Complete Lifecycle
#
# Purpose:
# - Policy-as-Code evaluation engine (FR1 + FR5)
# - Evaluate YAML policies converted to Rego
# - Gate approval/denial logic (Quality Gate Management)
#
# Features:
# - REST API for policy evaluation (POST /v1/data/{package_path})
# - Policy upload/deletion (PUT/DELETE /v1/policies/{policy_id})
# - Decision logging for audit trail
# - Prometheus metrics exporter
#
# Zero Mock Policy: Production-ready OPA configuration
# =========================================================================

---
# Service for OPA (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: opa
  namespace: sdlc-orchestrator
  labels:
    app.kubernetes.io/name: opa
    app.kubernetes.io/instance: sdlc-orchestrator-opa
    app.kubernetes.io/component: policy-engine
    app.kubernetes.io/part-of: sdlc-orchestrator-platform
    app.kubernetes.io/version: "0.58.0"

  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8181"
    prometheus.io/path: "/metrics"

spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8181
      targetPort: 8181
      protocol: TCP

  selector:
    app.kubernetes.io/name: opa
    app.kubernetes.io/instance: sdlc-orchestrator-opa

---
# Deployment for OPA (stateless, horizontally scalable)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: sdlc-orchestrator
  labels:
    app.kubernetes.io/name: opa
    app.kubernetes.io/instance: sdlc-orchestrator-opa
    app.kubernetes.io/component: policy-engine
    app.kubernetes.io/part-of: sdlc-orchestrator-platform
    app.kubernetes.io/version: "0.58.0"

spec:
  replicas: 2  # 2 replicas for HA (scale up to 5 for production)
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: opa
      app.kubernetes.io/instance: sdlc-orchestrator-opa

  template:
    metadata:
      labels:
        app.kubernetes.io/name: opa
        app.kubernetes.io/instance: sdlc-orchestrator-opa
        app.kubernetes.io/component: policy-engine
        app.kubernetes.io/part-of: sdlc-orchestrator-platform
        app.kubernetes.io/version: "0.58.0"

      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8181"

    spec:
      securityContext:
        runAsUser: 1000  # opa user
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true

      containers:
        - name: opa
          image: openpolicyagent/opa:0.58.0  # Official OPA image
          imagePullPolicy: IfNotPresent

          args:
            - "run"
            - "--server"
            - "--addr=0.0.0.0:8181"
            - "--log-level=info"
            - "--log-format=json"
            - "--set=decision_logs.console=true"  # Log decisions to stdout
            - "--set=status.console=true"         # Log status to stdout
            - "--set=bundles.sdlc.resource=/v1/bundles/sdlc"  # Bundle endpoint (optional)

          ports:
            - name: http
              containerPort: 8181
              protocol: TCP

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /health
              port: 8181
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health?ready=1
              port: 8181
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          # Startup probe (OPA starts fast, but allow 30s)
          startupProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 10

          volumeMounts:
            - name: opa-policies
              mountPath: /policies
              readOnly: true

      volumes:
        - name: opa-policies
          configMap:
            name: opa-policies
            optional: true  # Optional policies preloaded (can upload via API)

      # Affinity (spread across nodes for HA)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - opa
                topologyKey: kubernetes.io/hostname

---
# ConfigMap: OPA Policies (preloaded policies - optional)
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policies
  namespace: sdlc-orchestrator
  labels:
    app.kubernetes.io/name: opa
    app.kubernetes.io/component: policy-engine-config

data:
  # Example policy: Basic health check policy (always allow)
  healthcheck.rego: |
    package sdlc.healthcheck

    default allow = true

  # Example policy: Gate G0.1 Problem Definition Check
  gate_g0_1.rego: |
    package sdlc.gates.why.g0_1_problem_definition

    default allowed = false

    required_sections := [
        "Problem Statement",
        "Target Audience",
        "Success Metrics"
    ]

    # Allow if all required sections present
    allowed {
        count(missing_sections) == 0
    }

    # Calculate missing sections
    missing_sections[section] {
        section := required_sections[_]
        not input.prd_sections[section]
    }

    # Generate violations for missing sections
    violations[msg] {
        count(missing_sections) > 0
        msg := sprintf("PRD missing %d required section(s): %v",
                      [count(missing_sections), missing_sections])
    }
