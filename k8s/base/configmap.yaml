---
# =========================================================================
# Application ConfigMap - Non-Sensitive Configuration
# SDLC Orchestrator - Stage 03 (BUILD) - Week 9 Day 1
#
# Version: 1.0.0
# Date: December 16, 2025
# Status: ACTIVE - Week 9 Day 1 Kubernetes Deployment
# Authority: Backend Lead + DevOps Lead
# Framework: SDLC 4.9 Complete Lifecycle
#
# Purpose:
# - Non-sensitive application configuration
# - Service endpoints (PostgreSQL, Redis, OPA, MinIO)
# - Application settings (log level, CORS, version)
#
# Note: Sensitive data (passwords, secrets) in Secrets manifest
# =========================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: sdlc-orchestrator
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api-config

data:
  # Application Settings
  APP_NAME: "SDLC Orchestrator"
  APP_VERSION: "1.0.0"
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"

  # Database Configuration (PostgreSQL)
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "sdlc_orchestrator"
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "50"

  # Redis Configuration
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_POOL_SIZE: "10"

  # OPA Configuration
  OPA_URL: "http://opa:8181"
  OPA_TIMEOUT: "30"

  # MinIO Configuration (AGPL-safe network-only access)
  MINIO_ENDPOINT: "minio:9000"
  MINIO_SECURE: "false"
  MINIO_REGION: "us-east-1"
  MINIO_BUCKET_EVIDENCE: "gate-evidence"
  MINIO_BUCKET_POLICIES: "policy-docs"
  MINIO_BUCKET_BACKUPS: "backups"

  # JWT Configuration
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_HOURS: "1"
  REFRESH_TOKEN_EXPIRE_DAYS: "30"

  # CORS Configuration
  CORS_ORIGINS: "*"
  CORS_ALLOW_CREDENTIALS: "true"
  CORS_ALLOW_METHODS: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
  CORS_ALLOW_HEADERS: "*"

  # Rate Limiting
  RATE_LIMIT_PER_MINUTE: "100"
  RATE_LIMIT_BURST: "20"

  # Monitoring
  PROMETHEUS_ENABLED: "true"
  PROMETHEUS_PORT: "8000"
  PROMETHEUS_PATH: "/metrics"

  # Feature Flags
  FEATURE_OAUTH_GITHUB: "true"
  FEATURE_OAUTH_GOOGLE: "true"
  FEATURE_OAUTH_MICROSOFT: "true"
  FEATURE_MFA: "true"
  FEATURE_API_KEYS: "true"
