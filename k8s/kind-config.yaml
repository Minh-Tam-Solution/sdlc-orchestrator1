# kind (Kubernetes IN Docker) Cluster Configuration
# SDLC Orchestrator - Local Development Cluster
#
# Version: 1.0.0
# Date: December 16, 2025
# Purpose: Local Kubernetes cluster for testing SDLC Orchestrator deployments
#
# Usage:
#   kind create cluster --name sdlc-orchestrator --config k8s/kind-config.yaml
#
# This creates a 3-node cluster (1 control-plane + 2 workers) with:
# - Port mapping for Ingress (80 → 30080, 443 → 30443)
# - Sufficient resources for all SDLC Orchestrator components
# - Support for persistent volumes (local-path provisioner)

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

# Cluster Name (override with --name flag)
name: sdlc-orchestrator

# Kubernetes Nodes Configuration
nodes:
  # Control Plane Node (API server, scheduler, controller-manager)
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"

    # Port mappings for Ingress (NGINX)
    extraPortMappings:
      # HTTP (80 → 30080 on host)
      - containerPort: 80
        hostPort: 30080
        protocol: TCP

      # HTTPS (443 → 30443 on host)
      - containerPort: 443
        hostPort: 30443
        protocol: TCP

    # Extra mounts for persistent storage
    extraMounts:
      - hostPath: /tmp/kind-sdlc-orchestrator
        containerPath: /var/local-path-provisioner

    # Resource limits (optional, adjust based on host)
    # Uncomment if you need to limit resources
    # resources:
    #   limits:
    #     cpu: "4"
    #     memory: "8Gi"
    #   requests:
    #     cpu: "2"
    #     memory: "4Gi"

  # Worker Node 1 (runs application pods)
  - role: worker
    labels:
      node-role.kubernetes.io/worker: ""
      node.kubernetes.io/storage-type: "ssd"

    extraMounts:
      - hostPath: /tmp/kind-sdlc-worker1
        containerPath: /var/local-path-provisioner

  # Worker Node 2 (runs application pods + database pods)
  - role: worker
    labels:
      node-role.kubernetes.io/worker: ""
      node.kubernetes.io/storage-type: "ssd"

    extraMounts:
      - hostPath: /tmp/kind-sdlc-worker2
        containerPath: /var/local-path-provisioner

# Networking Configuration
networking:
  # Pod subnet (default: 10.244.0.0/16)
  podSubnet: "10.244.0.0/16"

  # Service subnet (default: 10.96.0.0/12)
  serviceSubnet: "10.96.0.0/12"

  # Disable default CNI (we'll use kindnet)
  disableDefaultCNI: false

  # API server address (default: 127.0.0.1)
  apiServerAddress: "127.0.0.1"

  # API server port (default: 6443)
  apiServerPort: 6443

# Feature Gates (Kubernetes alpha/beta features)
featureGates:
  # Enable ephemeral containers (for debugging)
  EphemeralContainers: true

  # Enable volume expansion
  ExpandPersistentVolumes: true

  # Enable CSI volume snapshots
  VolumeSnapshotDataSource: true

# Runtime Configuration
# Use containerd as container runtime (default in kind)
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5000"]
      endpoint = ["http://localhost:5000"]
