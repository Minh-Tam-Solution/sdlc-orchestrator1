id: "agent_reflect_01"
tool_name: "reflect_and_score"
prompt: "The agent completed a tool batch reading 3 files. Evaluate the quality of its response."
expected_behavior: >
  Calls the Evaluator-Optimizer evaluator model (deepseek-r1:32b, temperature=0)
