  /policies/evaluate:
    post:
      tags: [Policies]
      summary: Evaluate policy against gate (OPA integration)
      description: |
        Evaluate a policy against a gate with custom input data.

        **IMPORTANT**: Week 3 Day 4 uses MOCK OPA evaluation (no actual Rego execution).
        Full OPA integration will be added in Week 4 Days 3-4.

        **Real-World Example** (Week 3 Day 4 - Evaluate FRD Completeness):
        ```bash
        # Evaluate FRD Completeness policy for G1 gate
        curl -X POST http://localhost:8000/api/v1/policies/evaluate \
          -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." \
          -H "Content-Type: application/json" \
          -d '{
            "gate_id": "7c9e6679-7425-40de-944b-e07fc1f90ae7",
            "policy_id": "a2b3c4d5-e6f7-8901-bcde-f12345678901",
            "input_data": {
              "frd_sections": {
                "Introduction": true,
                "FunctionalRequirements": true,
                "APIContracts": true,
                "NonFunctionalRequirements": true
              }
            }
          }'
        ```

        **Response** (201 Created - PASS):
        ```json
        {
          "id": "e1f2a3b4-c5d6-7890-abcd-ef1234567890",
          "gate_id": "7c9e6679-7425-40de-944b-e07fc1f90ae7",
          "policy_id": "a2b3c4d5-e6f7-8901-bcde-f12345678901",
          "policy_name": "FRD Completeness",
          "result": "pass",
          "violations": [],
          "evaluated_at": "2025-11-18T14:30:00Z",
          "evaluated_by": "user-25e9ed25-c232-4ce3-a3ea-5458a85a915b"
        }
        ```

        **Response** (201 Created - FAIL):
        ```json
        {
          "id": "f2a3b4c5-d6e7-8901-bcde-f12345678901",
          "gate_id": "7c9e6679-7425-40de-944b-e07fc1f90ae7",
          "policy_id": "a2b3c4d5-e6f7-8901-bcde-f12345678901",
          "policy_name": "FRD Completeness",
          "result": "fail",
          "violations": [
            "FRD missing required section: APIContracts"
          ],
          "evaluated_at": "2025-11-18T14:30:00Z",
          "evaluated_by": "user-25e9ed25-c232-4ce3-a3ea-5458a85a915b"
        }
        ```

        **Flow** (Week 4 will replace step 5 with real OPA):
        1. Validate gate exists (404 if not found)
        2. Validate policy exists (404 if not found)
        3. Extract input_data from request body
        4. **Week 3 MOCK**: Call _mock_opa_evaluation(policy, input_data)
        5. **Week 4 REAL**: POST to http://opa:8181/v1/data/sdlc/{stage}/{policy_code}
        6. Parse result (pass/fail) and violations
        7. Save evaluation to policy_evaluations table
        8. Return evaluation result

      operationId: evaluatePolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [gate_id, policy_id, input_data]
              properties:
                gate_id:
                  type: string
                  format: uuid
                  description: Gate UUID to evaluate against
                  example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                policy_id:
                  type: string
                  format: uuid
                  description: Policy UUID to evaluate
                  example: a2b3c4d5-e6f7-8901-bcde-f12345678901
                input_data:
                  type: object
                  description: Input data for policy evaluation (JSON object passed to OPA)
                  example:
                    frd_sections:
                      Introduction: true
                      FunctionalRequirements: true
                      APIContracts: true
            examples:
              frd_completeness_pass:
                summary: FRD Completeness evaluation (PASS - Week 3 production)
                value:
                  gate_id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                  policy_id: a2b3c4d5-e6f7-8901-bcde-f12345678901
                  input_data:
                    frd_sections:
                      Introduction: true
                      FunctionalRequirements: true
                      APIContracts: true
                      NonFunctionalRequirements: true
              frd_completeness_fail:
                summary: FRD Completeness evaluation (FAIL - missing APIContracts)
                value:
                  gate_id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                  policy_id: a2b3c4d5-e6f7-8901-bcde-f12345678901
                  input_data:
                    frd_sections:
                      Introduction: true
                      FunctionalRequirements: true
                      APIContracts: false
      responses:
        '201':
          description: Policy evaluation created
          content:
            application/json:
              schema:
                type: object
                required: [id, gate_id, policy_id, policy_name, result, violations, evaluated_at, evaluated_by]
                properties:
                  id:
                    type: string
                    format: uuid
                    example: e1f2a3b4-c5d6-7890-abcd-ef1234567890
