  /github/webhook:
    post:
      tags: [GitHub]
      summary: Handle GitHub webhook events
      description: |
        Process GitHub webhook events (push, pull_request, issues, etc.).
        Validates HMAC signature and processes event.

        **Security**: HMAC signature validation required.

        **Example**:
        ```bash
        curl -X POST http://localhost:8000/api/v1/github/webhook \
          -H "Content-Type: application/json" \
          -H "X-GitHub-Event: push" \
          -H "X-Hub-Signature-256: sha256=..." \
          -d '{...webhook payload...}'
        ```
      operationId: handleGitHubWebhook
      security: []
      parameters:
        - name: X-GitHub-Event
          in: header
          required: true
          schema:
            type: string
          description: GitHub webhook event type
        - name: X-Hub-Signature-256
          in: header
          required: true
          schema:
            type: string
          description: HMAC SHA-256 signature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: GitHub webhook payload (varies by event type)
      responses:
        '200':
