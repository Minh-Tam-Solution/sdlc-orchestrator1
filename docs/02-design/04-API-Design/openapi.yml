      responses:
        '200':
          description: Repository contents retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GitHubRepositoryContents'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
