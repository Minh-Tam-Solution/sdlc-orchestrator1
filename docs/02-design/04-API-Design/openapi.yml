  - name: Projects
    description: Project CRUD operations
  - name: Gates
    description: SDLC gates (G0.1, G0.2, G1-G9)
  - name: Gate Approvals
    description: Gate approval workflow
  - name: Evidence
    description: Evidence vault (file upload, metadata)
  - name: Policies
    description: Gate policies (YAML/JSON configuration)
  - name: Audit Logs
