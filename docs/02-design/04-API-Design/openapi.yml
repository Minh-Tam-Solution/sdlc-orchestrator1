          "rego_code": "package sdlc.what.frd_completeness\n\ndefault allow = false\n\nallow {\n  input.frd_sections.Introduction\n  input.frd_sections.FunctionalRequirements\n  input.frd_sections.APIContracts\n}",
          "severity": "critical",
          "is_active": true,
          "version": "1.0.0",
          "created_at": "2025-11-18T10:00:00Z",
