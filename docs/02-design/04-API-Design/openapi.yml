  /github/sync:
    post:
      tags: [GitHub]
      summary: Sync GitHub repository to project
      description: |
        Create SDLC Orchestrator project from GitHub repository.
        Automatically analyzes repository, maps stages, and creates initial gates.

        **Example**:
        ```bash
        curl -X POST http://localhost:8000/api/v1/github/sync \
          -H "Authorization: Bearer {token}" \
          -H "Content-Type: application/json" \
          -d '{
            "github_repo_id": 123456789,
            "github_repo_full_name": "developer/my-project",
            "project_name": "My Project",
