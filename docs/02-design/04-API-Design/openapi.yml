openapi: 3.0.3
info:
  title: SDLC Orchestrator API
  version: 1.0.0
  description: |
    **SDLC Orchestrator** - Project governance tool enforcing SDLC Universal Framework.

    ## API Strategy (Hybrid)
    - **REST API**: Simple CRUD operations (gates, evidence, projects) - CLI/CI/CD friendly
    - **GraphQL API**: Complex queries (dashboards, reports) - Dashboard frontend

    ## Authentication
    - **JWT**: Access token (1 hour) + Refresh token (30 days)
    - **OAuth 2.0**: GitHub, Google, Microsoft (SSO)
    - **MFA**: TOTP mandatory for C-Suite (CEO, CTO, CPO, CIO, CFO)
    - **API Keys**: Service-to-service authentication (90-day rotation)

    ## Rate Limiting
    - **Free Tier**: 100 requests/hour
    - **Pro Tier**: 1,000 requests/hour
    - **Enterprise**: 10,000 requests/hour

    ## Versioning
    - **URL-based**: `/api/v1/...` (current), `/api/v2/...` (future)
    - **LTS Policy**: 18 months support after successor release
    - **Deprecation**: 90-day notice before removal

    ## Related Documents
    - [API-Specification.md](../../01-Planning-Analysis/04-API-Design/API-Specification.md)
    - [API-Authentication.md](../../01-Planning-Analysis/04-API-Design/API-Authentication.md)
    - [ADR-003-API-Strategy.md](../02-System-Architecture/Architecture-Decisions/ADR-003-API-Strategy.md)

  contact:
    name: SDLC Orchestrator Team
    email: api@sdlc-orchestrator.com
    url: https://docs.sdlc-orchestrator.com

  license:
    name: Proprietary
    url: https://sdlc-orchestrator.com/license

