  /github/authorize:
    get:
      tags: [GitHub]
      summary: Get GitHub OAuth authorization URL
      description: |
        Generate OAuth authorization URL for GitHub login/connect.
        Returns authorization URL and CSRF protection state parameter.

        **Flow**:
        1. Generate random state for CSRF protection
        2. Build authorization URL with client_id and scopes
        3. Return URL for frontend to redirect user

        **Example**:
        ```bash
        curl -X GET "http://localhost:8000/api/v1/github/authorize?redirect_uri=http://localhost:5173/auth/github/callback" \
          -H "Authorization: Bearer {token}"
        ```
      operationId: getGitHubAuthorizationURL
      security:
        - BearerAuth: []
      parameters:
        - name: redirect_uri
          in: query
          required: false
          schema:
            type: string
            format: uri
          description: Optional custom redirect URI
      responses:
        '200':
          description: Authorization URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubOAuthURLResponse'
              example:
                authorization_url: "https://github.com/login/oauth/authorize?client_id=abc123&scope=read:user%20user:email%20repo&state=xyz789"
                state: "xyz789"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /github/callback:
    post:
      tags: [GitHub]
      summary: Handle GitHub OAuth callback
      description: |
        Exchange authorization code for access token and create/link user.
        Returns JWT tokens for SDLC Orchestrator authentication.

        **Flow**:
        1. Exchange code for GitHub access token
        2. Get GitHub user info
        3. Find or create user in database
        4. Store GitHub OAuth account
        5. Generate JWT tokens for app authentication
        6. Return tokens and user info

        **Example**:
        ```bash
        curl -X POST http://localhost:8000/api/v1/github/callback \
          -H "Content-Type: application/json" \
          -d '{
            "code": "abc123def456",
            "state": "xyz789"
          }'
        ```
      operationId: handleGitHubOAuthCallback
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GitHubOAuthCallbackRequest'
      responses:
        '200':
          description: OAuth callback successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubOAuthCallbackResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

