        curl -X GET "http://localhost:8000/api/v1/github/repositories/developer/my-project/contents?path=src" \
          -H "Authorization: Bearer {token}"
        ```
      operationId: getGitHubRepositoryContents
      security:
        - BearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
          description: Repository owner
        - name: repo
          in: path
          required: true
          schema:
            type: string
          description: Repository name
        - name: path
          in: query
          required: false
          schema:
            type: string
            default: ""
          description: Path within repository (empty for root)
        - name: ref
