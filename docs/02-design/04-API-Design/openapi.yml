          type: string
          format: date-time
          nullable: true
          description: Last updated timestamp
          example: "2025-01-01T00:00:00Z"
        pushed_at:
          type: string
          format: date-time
          nullable: true
          description: Last push timestamp
          example: "2025-01-01T00:00:00Z"

    GitHubRepositoryListResponse:
      type: object
      required: [repositories, total]
      properties:
        repositories:
          type: array
          items:
            $ref: '#/components/schemas/GitHubRepository'
          description: List of repositories
        total:
          type: integer
          description: Total repository count
          example: 25
        page:
          type: integer
          default: 1
          description: Current page
          example: 1
        per_page:
          type: integer
          default: 30
          description: Items per page
          example: 30

    GitHubRepositoryContents:
      type: object
      required: [name, path, type, sha]
      properties:
        name:
          type: string
          description: File/directory name
          example: "main.py"
        path:
          type: string
          description: Path within repository
          example: "src/main.py"
        type:
          type: string
          enum: [file, dir]
          description: Type
          example: "file"
        size:
          type: integer
          default: 0
          description: File size in bytes
          example: 1024
        sha:
          type: string
          description: Git SHA hash
          example: "abc123def456"
        download_url:
          type: string
          format: uri
          nullable: true
          description: Raw file download URL
          example: "https://raw.githubusercontent.com/developer/my-project/main/src/main.py"

    GitHubRepositoryLanguages:
      type: object
      required: [languages]
      properties:
        languages:
          type: object
