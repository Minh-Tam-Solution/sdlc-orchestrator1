# Success Criteria v2.0 - CEO Time Saved Focus
# SDLC Orchestrator Governance System v1.0
#
# Version: 2.0.0
# Date: January 27, 2026
# Authority: Phase 0 Deliverable #4 (48-hour CTO Gate Review)
# CEO Approved: [PENDING SIGNATURE]
# CTO Approved: [PENDING SIGNATURE]
#
# Philosophy:
#   Orchestrator succeeds IF AND ONLY IF:
#   1. CEO works FASTER with Orchestrator than manual
#   2. Team CANNOT bypass without detection
#   3. Code quality INCREASES, not just compliance
#
# Measurement Frequency:
#   - Primary: Weekly (CEO time tracking)
#   - Secondary: Daily (developer friction)
#   - Tertiary: Weekly (Vibecoding Index average)

---

# ═══════════════════════════════════════════════════════════════
# PRIMARY METRIC: CEO TIME SAVED
# ═══════════════════════════════════════════════════════════════

primary_metrics:
  ceo_time_saved_per_sprint:
    description: "Hours saved per sprint by delegating governance to Orchestrator"
    baseline: 40  # hours/sprint (manual governance)

    targets:
      week_2:
        hours: 30
        reduction_percent: -25
        rationale: "Auto-approve Green PRs (<30 index), ownership checks automated"

      week_4:
        hours: 20
        reduction_percent: -50
        rationale: "Stage gating reduces debates, governance signals working"

      week_8:
        hours: 10
        reduction_percent: -75
        rationale: "85%+ PRs auto-approved, CEO reviews Red only"

    measurement_method: |
      CEO tracks daily activities in 8 categories:
        1. PR Code Review (time spent)
        2. Architecture Debates (time spent)
        3. Vibecoding Cleanup (time spent)
        4. Ownership Checks (time spent)
        5. Security Reviews (time spent)
        6. Calibration Sessions (time spent, maintained)
        7. Exception Approvals (time spent)
        8. Interruptions (time spent)

      Formula:
        time_saved = baseline_hours - current_hours
        percent_saved = (time_saved / baseline_hours) * 100

    calculation_example: |
      Week 2 Scenario:
        - PRs submitted: 25
        - Auto-approved (Green): 15 (60%)
        - Tech Lead review (Yellow): 6 (24%)
        - CEO review (Orange/Red): 4 (16%)

        CEO Time Breakdown:
          - PR reviews: 8h (was 18h, -56%)
          - Debates: 6h (was 8h, -25%)
          - Cleanup: 5h (was 6h, -17%)
          - Ownership: 1h (was 4h, -75%)
          - Security: 2h (was 3h, -33%)
          - Calibration: 2h (same, high value)
          - Exceptions: 1h (was 1.5h, -33%)
          - Interruptions: 5h (was 7.5h, -33%)

        Total: 30h (was 40h, -25% = WEEK 2 TARGET MET)

    alert_if: "CEO time increases week-over-week OR does not meet targets"

    failure_condition: |
      If CEO time does NOT decrease by Week 4:
        → Product FAILS (Orchestrator adds friction instead of removing it)
        → Rollback to WARNING mode, investigate root cause
        → Re-dogfood for 2 weeks

  ceo_pr_review_reduction:
    description: "Percentage of PRs that do NOT require CEO review"
    baseline: 0  # CEO reviews 100% of PRs manually

    targets:
      week_2: 60  # CEO reviews 40% of PRs
      week_4: 70  # CEO reviews 30% of PRs
      week_8: 85  # CEO reviews 15% of PRs

    formula: |
      ceo_pr_review_reduction = (
        (total_prs - ceo_reviewed_prs) / total_prs
      ) * 100

    measurement_method: |
      Track per PR:
        - total_prs: Count of all PRs created
        - ceo_reviewed_prs: Count where CEO manually reviewed
        - auto_approved_prs: Count with Vibecoding Index <30
        - tech_lead_approved_prs: Count with Index 31-60

    example:
      week_2:
        total_prs: 25
        auto_approved: 15
        tech_lead_reviewed: 6
        ceo_reviewed: 4
        reduction: (25 - 4) / 25 = 84% (EXCEEDS 60% target)

      week_4:
        total_prs: 30
        auto_approved: 20
        tech_lead_reviewed: 8
        ceo_reviewed: 2
        reduction: (30 - 2) / 30 = 93% (EXCEEDS 70% target)

  governance_without_ceo:
    description: "Percentage of governance decisions made without CEO involvement"
    baseline: 0  # CEO makes 100% of decisions manually

    targets:
      week_4: 70
      week_8: 85

    meaning: |
      Measures autonomy of governance system.
      High score = System can govern without CEO bottleneck.

    measurement_method: |
      Count governance decisions:
        - Gate evaluations (G0.1, G0.2, G1, G2, G3, G4)
        - Policy violations (ownership, intent, stage gating)
        - Exception approvals (break glass, bypass requests)
        - Vibecoding Index routing (auto-approve vs escalate)

      Formula:
        governance_without_ceo = (
          decisions_without_ceo / total_decisions
        ) * 100

# ═══════════════════════════════════════════════════════════════
# SECONDARY METRICS: DEVELOPER EXPERIENCE
# ═══════════════════════════════════════════════════════════════

secondary_metrics:
  developer_friction:
    description: "Time from PR ready to governance passed"
    target: "<5 minutes per PR to comply"
    baseline: 30  # minutes (manual compliance)

    breakdown:
      intent_generation:
        target: "<1 min"
        method: "Auto-generated by LLM (Ollama) or template fallback"

      ownership_annotation:
        target: "<1 min"
        method: "Auto-suggested from 4 sources (CODEOWNERS, git blame, directory, task creator)"

      context_attachment:
        target: "<0 min"
        method: "Automatic ADR/spec linkage, no human action"

      human_review_confirmation:
        target: "<3 min"
        method: "Developer confirms auto-generated artifacts, makes minor edits"

    measurement_method: |
      Track per PR:
        - timestamp_pr_created
        - timestamp_governance_passed

      developer_friction = timestamp_governance_passed - timestamp_pr_created

    alert_if: "friction >10 minutes (2x target)"

    failure_condition: |
      If developer friction >10 min consistently:
        → Auto-generation not working (check LLM latency)
        → Feedback templates not actionable (improve CLI commands)
        → Stage gating too strict (review rules)

  first_submission_pass_rate:
    description: "Percentage of PRs that pass governance on first try"
    targets:
      week_2: 50
      week_4: 70
      week_8: 85

    meaning: |
      High pass rate = Developer understands governance requirements.
      Low pass rate = Feedback not actionable OR requirements unclear.

    measurement_method: |
      Track per PR:
        - submission_attempts: Count of governance validation attempts
        - passed_on_first: 1 if submission_attempts == 1, else 0

      Formula:
        first_pass_rate = (
          sum(passed_on_first) / total_prs
        ) * 100

    improvement_strategy: |
      If pass rate <70% by Week 4:
        1. Review rejection reasons (top 5 causes)
        2. Improve feedback templates (more actionable CLI commands)
        3. Update auto-generation quality (LLM prompt tuning)
        4. Developer training (governance expectations)

  auto_generation_usage:
    description: "Percentage of compliance artifacts that are auto-generated"
    target: ">80%"
    baseline: 0  # Everything manual

    meaning: |
      Developers DON'T write compliance docs manually.
      Auto-generation = path of least resistance.

    measurement_method: |
      Track per artifact:
        - intent_statements: auto_generated=true count / total
        - ownership_annotations: auto_generated=true count / total
        - context_attachments: auto_generated=true count / total
        - ai_attestations: auto_generated=true count / total

      Formula:
        auto_generation_usage = (
          auto_generated_count / total_artifacts
        ) * 100

    failure_condition: |
      If usage <80% by Week 4:
        → Developers bypassing auto-generation (too slow?)
        → Auto-generation quality low (developers prefer manual)
        → LLM timeouts frequent (fallback to template too often)

  developer_satisfaction:
    description: "Net Promoter Score (NPS) for governance system"
    target: ">50"
    baseline: -50  # Assumed negative (governance = annoying)

    survey_questions:
      - question: "Does governance help or slow you down?"
        options:
          - "Helps me ship faster (scores +100)"
          - "Neutral (scores 0)"
          - "Slows me down (scores -100)"

      - question: "Would you recommend Orchestrator to other teams?"
        options:
          - "Definitely (Promoter, scores 9-10)"
          - "Maybe (Passive, scores 7-8)"
          - "No (Detractor, scores 0-6)"

      - question: "What's most annoying about governance?"
        type: "open_text"
        analysis: "Categorize complaints, prioritize fixes"

    frequency: "Weekly survey (anonymous)"

    nps_calculation: |
      NPS = (% Promoters) - (% Detractors)

      Example:
        Responses: 20
        Promoters (9-10): 12 (60%)
        Passives (7-8): 5 (25%)
        Detractors (0-6): 3 (15%)

        NPS = 60% - 15% = 45 (approaching target)

# ═══════════════════════════════════════════════════════════════
# TERTIARY METRICS: VIBECODING INDEX
# ═══════════════════════════════════════════════════════════════

tertiary_metrics:
  vibecoding_index_average:
    description: "Average Vibecoding Index across all PRs"

    thresholds:
      green: 0-30
      yellow: 31-60
      orange: 61-80
      red: 81-100

    targets:
      week_2_baseline: "Establish average (no target yet)"
      week_4: 40  # Average <40 (green-yellow boundary)
      week_8: 30  # Average <30 (green zone)

    measurement_method: |
      Calculate per PR:
        - vibecoding_index: Composite score from 5 signals

      Formula:
        avg_index = sum(vibecoding_index) / total_prs

    interpretation: |
      Decreasing average = Codebase quality improving over time.
      Increasing average = Technical debt accumulating (alert CEO).

    breakdown_by_signal:
      architectural_smell:
        target_avg: "<20"
        meaning: "Fewer god classes, shotgun surgery"

      abstraction_complexity:
        target_avg: "<15"
        meaning: "Less over-engineering"

      ai_dependency_ratio:
        target_avg: "<25"
        meaning: "AI code properly reviewed"

      change_surface_area:
        target_avg: "<30"
        meaning: "Smaller, focused PRs"

      drift_velocity:
        target_avg: "<20"
        meaning: "Codebase not diverging"

  bypass_incidents:
    description: "Attempts to commit without governance validation"
    target: 0
    baseline: "Unknown (new system)"

    measurement_method: |
      Track events:
        - Pre-commit hook bypass attempts (git commit --no-verify)
        - Manual merge without PR (direct push to main)
        - Break glass activations without proper justification

      Alert on ANY bypass incident.

    consequences: |
      Bypass incident triggers:
        1. Immediate Slack alert to CEO + CTO
        2. Audit log entry (immutable, 7-year retention)
        3. User account flagged for review
        4. Post-incident review required within 24 hours

    alert_if: ">0 incidents per week"

  auto_reject_accuracy:
    description: "Percentage of auto-rejects that CEO agrees with"
    target: ">95%"
    baseline: "Unknown (new system)"

    measurement_method: |
      Track when Vibecoding Index triggers Red (81-100):
        - total_auto_rejects: Count of Red-routed PRs
        - ceo_agrees: Count where CEO confirms rejection justified
        - ceo_disagrees: Count where CEO overrides (false positive)

      Formula:
        auto_reject_accuracy = (
          ceo_agrees / total_auto_rejects
        ) * 100

    failure_condition: |
      If accuracy <95%:
        → Signals miscalibrated (adjust weights)
        → MAX CRITICALITY OVERRIDE too aggressive (tune patterns)
        → CEO expectations changed (re-run calibration session)

  code_quality_improvement:
    description: "Proxy metrics for long-term code quality"

    metrics:
      test_coverage:
        baseline: 80
        target: 90
        measurement: "pytest --cov weekly report"

      code_review_comments:
        baseline: 100  # comments/week
        target: 50     # -50% reduction
        measurement: "GitHub PR review comment count"
        rationale: "Fewer comments = governance caught issues early"

      production_bugs:
        baseline: 100  # bugs/quarter
        target: 40     # -60% reduction
        measurement: "P0/P1 bug ticket count"
        rationale: "Better governance = fewer production issues"

      technical_debt:
        baseline: 100  # debt score (SonarQube)
        target: 60     # -40% reduction
        measurement: "SonarQube technical debt ratio"
        rationale: "Vibecoding Index reduces debt accumulation"

    frequency: "Quarterly comparison"

# ═══════════════════════════════════════════════════════════════
# FAILURE CRITERIA (Product FAILS if any of these occur)
# ═══════════════════════════════════════════════════════════════

failure_criteria:
  primary_failure:
    - condition: "CEO time does NOT decrease by Week 4"
      consequence: "Product FAILS - Orchestrator adds friction, not removes it"
      action: "Rollback to WARNING mode, investigate root cause, re-dogfood 2 weeks"

    - condition: "CEO time INCREASES week-over-week for 2 consecutive weeks"
      consequence: "Product FAILS - System making things worse"
      action: "Immediate kill switch activation, emergency CTO review"

  secondary_failure:
    - condition: "Developer friction >10 min consistently (2 weeks)"
      consequence: "Product adoption FAILS - Too slow, developers bypass"
      action: "Review auto-generation latency, improve LLM fallback, simplify compliance"

    - condition: "First pass rate <50% by Week 4"
      consequence: "Feedback not actionable - Developers confused"
      action: "Review feedback templates, improve CLI commands, developer training"

    - condition: "Developer NPS <0 by Week 4"
      consequence: "Product hated - Team will revolt"
      action: "Emergency user research, identify pain points, prioritize UX fixes"

  tertiary_failure:
    - condition: "Vibecoding Index average >60 by Week 8"
      consequence: "Codebase quality NOT improving - Governance ineffective"
      action: "Recalibrate signals, review CEO overrides, adjust weights"

    - condition: "Bypass incidents >3/week"
      consequence: "Governance not enforced - System circumvented"
      action: "Harden pre-commit hooks, investigate bypass reasons, stricter enforcement"

    - condition: "Auto-reject accuracy <80%"
      consequence: "False positives too high - CEO loses trust"
      action: "Emergency calibration session, recalibrate signal weights, review critical paths"

# ═══════════════════════════════════════════════════════════════
# KILL SWITCH CRITERIA (Automatic Rollback)
# ═══════════════════════════════════════════════════════════════

kill_switch:
  description: "Automatic rollback if governance causes problems"

  auto_trigger_conditions:
    rejection_rate:
      threshold: ">80%"
      rationale: "Too many rejects = system too strict"
      action: "Rollback to WARNING mode"

    latency_p95:
      threshold: ">500ms"
      rationale: "Too slow = developer friction"
      action: "Rollback to WARNING mode"

    false_positive_rate:
      threshold: ">20%"
      rationale: "Too many mistakes = CEO loses trust"
      action: "Rollback to WARNING mode"

    developer_complaints:
      threshold: ">5/day"
      rationale: "Team unhappy = product adoption fails"
      action: "Rollback to WARNING mode"

  rollback_to: "WARNING"
  notify:
    - "CTO"
    - "CEO"
    - "Tech Lead"
    - "#sdlc-governance Slack channel"

  post_rollback_action:
    - "Immediate CTO + CEO review meeting (within 2 hours)"
    - "Root cause analysis (within 24 hours)"
    - "Fix implementation plan (within 48 hours)"
    - "Re-dogfood cycle (2 weeks) before re-enabling"

# ═══════════════════════════════════════════════════════════════
# MEASUREMENT DASHBOARD
# ═══════════════════════════════════════════════════════════════

dashboard:
  ceo_dashboard:
    url: "/app/governance/ceo-dashboard"
    refresh: "Real-time (WebSocket)"

    sections:
      time_saved_today:
        metric: "primary_metrics.ceo_time_saved_per_sprint"
        display: "Gauge (0-40h, target=10h)"
        color_coding:
          green: "<15h"
          yellow: "15-25h"
          red: ">25h"

      prs_auto_approved:
        metric: "primary_metrics.ceo_pr_review_reduction"
        display: "Percentage (0-100%)"
        breakdown:
          green: "Auto-approved (<30 index)"
          yellow: "Tech Lead review (31-60)"
          orange: "CEO should review (61-80)"
          red: "CEO must review (81-100)"

      pending_your_decision:
        metric: "Count of Orange/Red PRs awaiting CEO"
        display: "Queue (prioritized by index)"
        action: "Click to review PR"

      this_week_summary:
        metrics:
          - compliance_percent
          - violations_trend
          - review_time_saved
        display: "Line chart (7-day trend)"

  tech_dashboard:
    url: "/app/governance/tech-dashboard"
    refresh: "Every 5 minutes"

    sections:
      developer_friction:
        metric: "secondary_metrics.developer_friction"
        display: "Histogram (time to comply per PR)"
        alert_threshold: ">10 min"

      first_pass_rate:
        metric: "secondary_metrics.first_submission_pass_rate"
        display: "Percentage (weekly trend)"
        target_line: "70%"

      vibecoding_index_distribution:
        metric: "tertiary_metrics.vibecoding_index_average"
        display: "Heatmap (Green/Yellow/Orange/Red)"
        breakdown_by_signal: true

  ops_dashboard:
    url: "/app/governance/ops-dashboard"
    refresh: "Real-time (Prometheus)"

    sections:
      system_health:
        metrics:
          - "Latency P95 (target: <500ms)"
          - "Uptime (target: >99%)"
          - "LLM success rate (target: >90%)"
          - "Fallback rate (target: <10%)"
        alert_rules:
          - "Latency P95 >500ms for 5 minutes → Page on-call"
          - "Uptime <99% → Alert CTO"
          - "LLM success rate <70% → Alert DevOps"

      kill_switch_status:
        display: "🟢 ACTIVE | 🔴 TRIGGERED"
        last_triggered: "timestamp"
        reason: "text"

# ═══════════════════════════════════════════════════════════════
# WEEKLY REPORTING
# ═══════════════════════════════════════════════════════════════

weekly_reporting:
  ceo_report:
    frequency: "Every Friday 3pm"
    recipients:
      - "CEO"
      - "CTO"
      - "CPO"

    sections:
      executive_summary:
        - "CEO Time Saved This Week: {hours}h (target: {target}h)"
        - "PRs Auto-Approved: {percent}% (target: {target}%)"
        - "Vibecoding Index Average: {avg} (target: <{target})"
        - "Developer Satisfaction NPS: {nps} (target: >{target})"

      key_metrics:
        - primary_metrics (all)
        - secondary_metrics (summary)
        - tertiary_metrics (trends)

      concerns:
        - "List any metrics below target"
        - "List any kill switch triggers"
        - "List any bypass incidents"

      action_items:
        - "Prioritized list of improvements needed"
        - "Assigned owners + deadlines"

  tech_report:
    frequency: "Every Monday 9am"
    recipients:
      - "Tech Lead"
      - "Backend Lead"
      - "DevOps Lead"

    sections:
      system_performance:
        - "Latency P95: {value}ms (target: <500ms)"
        - "Uptime: {value}% (target: >99%)"
        - "LLM Success Rate: {value}% (target: >90%)"

      top_violations:
        - "Top 5 governance violations this week"
        - "Root cause analysis for each"
        - "Improvement recommendations"

      calibration_updates:
        - "CEO overrides this week: {count}"
        - "Weight adjustments made: {changes}"
        - "Next calibration session: {date}"

# ═══════════════════════════════════════════════════════════════
# GO/NO-GO DECISION CRITERIA
# ═══════════════════════════════════════════════════════════════

go_no_go:
  week_2_checkpoint:
    criteria:
      - condition: "CEO time saved ≥25% (30h or less)"
        required: true
      - condition: "Developer friction <10 min"
        required: true
      - condition: "No kill switch triggers"
        required: true

    decision:
      go: "Proceed to Week 3-4, continue SOFT enforcement"
      no_go: "Extend WARNING mode, iterate on UX, re-dogfood 1 week"

  week_4_checkpoint:
    criteria:
      - condition: "CEO time saved ≥50% (20h or less)"
        required: true
      - condition: "First pass rate ≥70%"
        required: true
      - condition: "Developer NPS >0"
        required: true
      - condition: "Vibecoding Index average <40"
        required: false  # Nice-to-have

    decision:
      go: "Proceed to Week 5-8, enable FULL enforcement"
      no_go: "Rollback to SOFT, root cause analysis, re-dogfood 2 weeks"

  week_8_final:
    criteria:
      - condition: "CEO time saved ≥75% (10h or less)"
        required: true
      - condition: "Developer friction <5 min"
        required: true
      - condition: "First pass rate ≥85%"
        required: true
      - condition: "Developer NPS >50"
        required: true
      - condition: "Vibecoding Index average <30"
        required: true
      - condition: "Bypass incidents = 0"
        required: true

    decision:
      go: "Product SUCCESS - Begin customer rollout"
      no_go: "Product FAILS - Major redesign needed, pause rollout"

---

# CEO APPROVAL

ceo_signature:
  name: "[CEO NAME]"
  date: "[DATE]"
  commitment: |
    I commit to:
      - NOT reviewing Green PRs (Index <30)
      - Tracking my time weekly for measurement
      - Providing override feedback for calibration
      - Weekly dashboard review

# CTO APPROVAL

cto_signature:
  name: "[CTO NAME]"
  date: "[DATE]"
  commitment: |
    I commit to:
      - Kill switch readiness (<5 min rollback)
      - Weekly calibration sessions
      - System performance monitoring
      - Developer friction investigation

