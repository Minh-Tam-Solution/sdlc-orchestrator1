risks:
  - risk: "CockroachDB migration causes data inconsistency"
    impact: "CRITICAL"
    probability: "LOW"
    mitigation: |
      - Dual-write strategy during migration (PostgreSQL + CockroachDB)
      - Rollback plan: Keep PostgreSQL as fallback for 4 weeks
      - Data validation: Checksums on all tables post-migration
      - Migration rehearsal: Practice on staging environment

  - risk: "500K load test reveals unexpected bottlenecks"
    impact: "HIGH"
    probability: "MEDIUM"
    mitigation: |
      - Early load test (Week 2) to identify issues
      - Budget 2 weeks for optimization
      - Fallback: Reduce target to 300K (still 5-year headroom)
      - Expert consultation: AWS Solutions Architect

  - risk: "SOC 2 audit finds critical gaps"
    impact: "HIGH"
    probability: "LOW"
    mitigation: |
      - Pre-audit (Week 8) to identify gaps
      - Phase 4 SOC 2 readiness reduces risk
      - Remediation budget: 2 weeks
      - Experienced auditor (Deloitte, prior relationship)

  - risk: "Multi-region latency exceeds targets"
    impact: "MEDIUM"
    probability: "MEDIUM"
    mitigation: |
      - Synthetic monitoring from Day 1
      - Edge caching (CloudFront)
      - Database geo-partitioning (data locality)
      - Fallback: Increase latency target to <200ms

  - risk: "50-team onboarding overwhelms support"
    impact: "MEDIUM"
    probability: "MEDIUM"
    mitigation: |
      - Self-service onboarding (automated)
      - Champion program (2 champions per BU)
      - Office hours (2x/week for first month)
      - Knowledge base with video tutorials

assumptions:
  - assumption: "Phase 4 success (5/5 VCR) provides stable foundation"
    validation: "Phase 4 metrics maintained in Phase 5A"

  - assumption: "CockroachDB supports 500K concurrent connections"
    validation: "Vendor confirmation + load test Week 2"

  - assumption: "50 teams can be onboarded in 2 weeks"
    validation: "10 teams/day with automated provisioning"

  - assumption: "EU region complies with GDPR requirements"
    validation: "Legal review of CockroachDB geo-partitioning"

  - assumption: "Enterprise customers (3) will adopt multi-region"
    validation: "Customer interviews confirm need (Phase 4)"

