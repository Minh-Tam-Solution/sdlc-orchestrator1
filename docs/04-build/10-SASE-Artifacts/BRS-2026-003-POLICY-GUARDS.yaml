# ============================================================================
# SECTION 5: RISKS & MITIGATIONS
# ============================================================================

risks:

  - id: RISK-01
    description: OPA performance bottleneck under load
    probability: MEDIUM
    impact: HIGH
    mitigation: |
      - Pre-load policies at startup
      - Use OPA bundles for efficiency
      - Implement policy caching
      - Fallback to simple rules if OPA unavailable

  - id: RISK-02
    description: Semgrep scan timeout on large PRs
    probability: MEDIUM
    impact: MEDIUM
    mitigation: |
      - Set 60s timeout per file
      - Scan only changed files (not full repo)
      - Use --skip-unknown-extensions
      - Async processing with progress updates

  - id: RISK-03
    description: Override abuse (too many overrides)
    probability: LOW
    impact: HIGH
    mitigation: |
      - Track override rate per project/user
      - Alert if rate exceeds 5%
      - Require Tech Lead+ approval
      - Weekly override review meeting

  - id: RISK-04
    description: False positives in policy evaluation
    probability: HIGH
    impact: MEDIUM
    mitigation: |
      - Start with warning-only mode (non-blocking)
      - Collect feedback before enabling blocking
      - Allow per-project policy customization
      - Document false positive patterns

