# AGENT INSTRUCTIONS (OPTIONAL)
agent_instructions:
  # SOP structure guidance
  sop_structure: |
    Each generated SOP must include:

    1. **Header Section**
       - Document ID: SOP-[TYPE]-[NUMBER]
       - Version: X.Y.Z
       - Effective Date: YYYY-MM-DD
       - Owner: [Role]
       - Approver: [Role]

    2. **Purpose** (2-3 sentences)
       - What this SOP covers
       - Why it's important

    3. **Scope** (bullet points)
       - What systems/processes are covered
       - What is explicitly excluded

    4. **Procedure** (numbered steps)
       - Step-by-step instructions
       - Clear, actionable language
       - Include decision points (if/then)

    5. **Roles and Responsibilities** (table)
       - Role | Responsibility | RACI

    6. **Quality Criteria** (checklist)
       - How to verify procedure was followed correctly
       - Success indicators

    7. **Revision History** (table)
       - Version | Date | Author | Changes

  # Quality guidelines
  quality_guidelines:
    - "Use clear, concise language (no jargon)"
    - "Include specific details (names, paths, commands)"
    - "Add warnings for critical steps"
    - "Reference related documents when applicable"
    - "Ensure steps are in logical order"

  # Things to avoid
  avoid:
    - "Vague instructions ('configure appropriately')"
    - "Missing prerequisites"
    - "Unclear decision points"
    - "Technical jargon without explanation"
    - "Incomplete role assignments"

  # Pre-submission checklist
  pre_submission_checklist:
    - "All 7 SOP sections present"
    - "Document ID follows naming convention"
    - "Version and dates are valid"
    - "No placeholder text remains"
    - "Steps are numbered and clear"
    - "Quality criteria defined"

