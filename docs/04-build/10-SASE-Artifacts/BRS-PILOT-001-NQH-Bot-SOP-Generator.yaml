# PROBLEM DEFINITION (MANDATORY)
problem:
  title: "NQH-Bot SOP Generator for ISO 9001 Compliance"

  description: |
    NQH team needs Standard Operating Procedures (SOPs) for various workflows
    to maintain ISO 9001 certification and ensure operational consistency.

    Current State (Pain Points):
    - SOPs are created manually by PM/PO
    - Each SOP takes 2-4 hours to write from scratch
    - Format is inconsistent across different SOPs
    - No version control or evidence trail
    - Updates require manual revision of entire document

    Impact:
    - PM/PO time wasted on repetitive documentation
    - Inconsistent quality affects audit readiness
    - Delayed SOP creation blocks process improvements
    - No traceability for compliance audits

  stakeholders:
    - role: "PM/PO"
      impact: "HIGH"
      description: "Primary user - creates and reviews SOPs"
    - role: "Operations Team"
      impact: "HIGH"
      description: "Uses SOPs for daily procedures"
    - role: "Quality Assurance"
      impact: "MEDIUM"
      description: "Audits SOPs for ISO 9001 compliance"
    - role: "Development Team"
      impact: "LOW"
      description: "References SOPs for operational tasks"

  evidence:
    - type: "Time Tracking"
      source: "PM/PO Sprint Reports"
      description: "Average 2-4 hours per SOP creation"
    - type: "Audit Finding"
      source: "ISO 9001 Internal Audit 2024"
      description: "Inconsistent SOP format noted"
    - type: "Backlog"
      source: "NQH Project Board"
      description: "15+ SOPs pending creation"

