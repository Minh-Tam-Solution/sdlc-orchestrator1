# SUCCESS CRITERIA (MANDATORY)
success_criteria:
  # Functional requirements
  functional:
    - id: "FR1"
      description: "Generate SOP markdown from workflow description input"
      verification: "SOP output matches expected structure"
      priority: "MUST"
      acceptance: "SOP contains all required sections"

    - id: "FR2"
      description: "Include mandatory SOP sections: Purpose, Scope, Procedure, Roles, Quality Criteria"
      verification: "Section presence validation"
      priority: "MUST"
      acceptance: "All 5 sections present in output"

    - id: "FR3"
      description: "Support 5 SOP types: Deployment, Incident, Change, Backup, Security"
      verification: "Generate sample SOP for each type"
      priority: "MUST"
      acceptance: "5 different SOP types generated successfully"

    - id: "FR4"
      description: "Validate ISO 9001 compliance elements (document control, revision history)"
      verification: "ISO 9001 checklist validation"
      priority: "SHOULD"
      acceptance: "Compliance checklist ≥80%"

    - id: "FR5"
      description: "Save generated SOP to Evidence Vault with SHA256 hash"
      verification: "Evidence Vault storage confirmation"
      priority: "MUST"
      acceptance: "SOP stored with valid hash"

    - id: "FR6"
      description: "Generate MRP with evidence for each SOP creation"
      verification: "MRP artifact created"
      priority: "MUST"
      acceptance: "MRP contains: SOP content, template used, generation time, quality score"

    - id: "FR7"
      description: "Enable VCR workflow for SOP approval"
      verification: "VCR decision recorded"
      priority: "MUST"
      acceptance: "VCR with APPROVED/REJECTED/REVISION status"

  # Non-functional requirements
  non_functional:
    - id: "NFR1"
      category: "Performance"
      description: "SOP generation time < 30 seconds (p95)"
      measurement: "API response time metrics"
      priority: "SHOULD"

    - id: "NFR2"
      category: "Quality"
      description: "Generated SOP quality rating ≥ 4/5 (human reviewer)"
      measurement: "Post-generation survey"
      priority: "MUST"

    - id: "NFR3"
      category: "Cost"
      description: "Agent cost < $50/month (Ollama primary)"
      measurement: "Ollama usage tracking"
      priority: "MUST"

    - id: "NFR4"
      category: "Reliability"
      description: "SOP generation success rate ≥ 95%"
      measurement: "Success/failure ratio"
      priority: "SHOULD"

    - id: "NFR5"
      category: "Security"
      description: "No sensitive data leakage in SOP content"
      measurement: "Content scan before storage"
      priority: "MUST"

  # Definition of Done
