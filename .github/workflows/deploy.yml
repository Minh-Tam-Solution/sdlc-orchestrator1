# =========================================================================
# GitHub Actions Workflow - Kubernetes Deployment
# SDLC Orchestrator - Stage 04 (SHIP) - Week 9 Day 2
#
# Version: 1.0.0
# Date: December 17, 2025
# Status: ACTIVE - Week 9 Day 2 CI/CD Pipeline
# Authority: DevOps Lead + CTO Approved
# Foundation: kubectl, kustomize, GitHub Actions
# Framework: SDLC 4.9 Complete Lifecycle
#
# Purpose:
# - Automated deployment to Kubernetes clusters
# - Environment-specific overlays (dev, staging, production)
# - Zero-downtime rolling updates
# - Rollback on failure
# - Health check validation
#
# Triggers:
# - Push to main (production deployment)
# - Push to develop (staging deployment)
# - Manual workflow dispatch
#
# Zero Mock Policy: Production-ready deployments only
# =========================================================================

name: Deploy to Kubernetes

on:
  push:
    branches:
      - main      # Production
      - develop   # Staging

  # Allow manual workflow dispatch
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - development
          - staging
          - production

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel deployments

jobs:
  # =========================================================================
  # Deploy to Development
  # =========================================================================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'development')
    environment:
      name: development
      url: https://dev.sdlc-orchestrator.com

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      # Setup kustomize
      - name: Setup kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      # Configure kubectl
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > ~/.kube/config
          kubectl config use-context dev-cluster

      # Build kustomize manifests
      - name: Build kustomize manifests
        run: |
          cd k8s/overlays/dev
          kustomize build . > /tmp/manifests-dev.yaml
          cat /tmp/manifests-dev.yaml

      # Apply manifests
      - name: Deploy to development
        run: |
          kubectl apply -f /tmp/manifests-dev.yaml
          kubectl rollout status deployment/backend -n sdlc-orchestrator-dev --timeout=5m

      # Health check
      - name: Health check
        run: |
          kubectl wait --for=condition=ready pod -l app=backend -n sdlc-orchestrator-dev --timeout=5m
          kubectl get pods -n sdlc-orchestrator-dev

  # =========================================================================
  # Deploy to Staging
  # =========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://staging.sdlc-orchestrator.com

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      # Setup kustomize
      - name: Setup kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      # Configure kubectl
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
          kubectl config use-context staging-cluster

      # Build kustomize manifests
      - name: Build kustomize manifests
        run: |
          cd k8s/overlays/staging
          kustomize build . > /tmp/manifests-staging.yaml
          cat /tmp/manifests-staging.yaml

      # Apply manifests
      - name: Deploy to staging
        run: |
          kubectl apply -f /tmp/manifests-staging.yaml
          kubectl rollout status deployment/backend -n sdlc-orchestrator-staging --timeout=5m

      # Health check
      - name: Health check
        run: |
          kubectl wait --for=condition=ready pod -l app=backend -n sdlc-orchestrator-staging --timeout=5m
          kubectl get pods -n sdlc-orchestrator-staging

  # =========================================================================
  # Deploy to Production
  # =========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://api.sdlc-orchestrator.com

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      # Setup kustomize
      - name: Setup kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      # Configure kubectl
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config
          kubectl config use-context prod-cluster

      # Build kustomize manifests
      - name: Build kustomize manifests
        run: |
          cd k8s/overlays/prod
          kustomize build . > /tmp/manifests-prod.yaml
          cat /tmp/manifests-prod.yaml

      # Apply manifests (with approval gate in GitHub environment settings)
      - name: Deploy to production
        run: |
          kubectl apply -f /tmp/manifests-prod.yaml
          kubectl rollout status deployment/backend -n sdlc-orchestrator --timeout=10m

      # Health check
      - name: Health check
        run: |
          kubectl wait --for=condition=ready pod -l app=backend -n sdlc-orchestrator --timeout=10m
          kubectl get pods -n sdlc-orchestrator

      # Smoke tests
      - name: Run smoke tests
        run: |
          BACKEND_URL="https://api.sdlc-orchestrator.com"

          echo "Testing health endpoint..."
          curl -f "$BACKEND_URL/health" || exit 1

          echo "Testing API v1 endpoint..."
          curl -f "$BACKEND_URL/api/v1/health" || exit 1

          echo "✅ Smoke tests passed!"

  # =========================================================================
  # Deployment Summary
  # =========================================================================
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Deployment Summary Report
        run: |
          echo "=========================================="
          echo "Kubernetes Deployment Summary"
          echo "=========================================="
          echo ""
          echo "Development: ${{ needs.deploy-dev.result }}"
          echo "Staging: ${{ needs.deploy-staging.result }}"
          echo "Production: ${{ needs.deploy-production.result }}"
          echo ""

          if [[ "${{ needs.deploy-dev.result }}" == "success" ]] || \
             [[ "${{ needs.deploy-staging.result }}" == "success" ]] || \
             [[ "${{ needs.deploy-production.result }}" == "success" ]]; then
            echo "✅ Deployment completed!"
            exit 0
          else
            echo "❌ Deployment failed"
            exit 1
          fi
