# =========================================================================
# GitHub Actions Workflow - Docker Image Build & Push
# SDLC Orchestrator - Stage 04 (SHIP) - Week 9 Day 2
#
# Version: 1.0.0
# Date: December 17, 2025
# Status: ACTIVE - Week 9 Day 2 CI/CD Pipeline
# Authority: DevOps Lead + Backend Lead + CTO Approved
# Foundation: Docker, Docker Compose, GitHub Container Registry
# Framework: SDLC 4.9 Complete Lifecycle
#
# Purpose:
# - Build and push Docker images for backend API
# - Multi-stage builds for optimized image size
# - Tag images with git SHA and semantic version
# - Push to GitHub Container Registry (ghcr.io)
# - Security scanning with Trivy
#
# Triggers:
# - Push to main branch (production)
# - Push to develop branch (staging)
# - Manual workflow dispatch
#
# Zero Mock Policy: Production-ready Docker images only
# =========================================================================

name: Build & Push Docker Images

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

  # Allow manual workflow dispatch
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =========================================================================
  # Build Backend Docker Image
  # =========================================================================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      # Security scan with Trivy
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      # Upload Trivy results to GitHub Security tab
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # =========================================================================
  # Build Summary
  # =========================================================================
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: always()

    steps:
      - name: Build Summary Report
        run: |
          echo "=========================================="
          echo "Docker Image Build Summary"
          echo "=========================================="
          echo ""
          echo "Backend Image: ${{ needs.build-backend.result }}"
          echo ""

          if [[ "${{ needs.build-backend.result }}" == "success" ]]; then
            echo "✅ All images built successfully!"
            echo "Images pushed to: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
            exit 0
          else
            echo "❌ Some images failed to build"
            exit 1
          fi
