# =========================================================================
# GitHub Actions Workflow - Automated Testing
# SDLC Orchestrator - Stage 04 (SHIP) - Week 9 Day 2
#
# Version: 1.0.0
# Date: December 17, 2025
# Status: ACTIVE - Week 9 Day 2 CI/CD Pipeline
# Authority: DevOps Lead + Backend Lead + Frontend Lead + CTO Approved
# Foundation: pytest, pytest-cov, Vitest, Docker Compose
# Framework: SDLC 4.9 Complete Lifecycle
#
# Purpose:
# - Automated unit and integration testing on every push and PR
# - Backend: pytest with coverage reporting (95%+ target)
# - Frontend: Vitest with coverage reporting
# - Integration tests with real services (PostgreSQL, Redis, OPA, MinIO)
# - Coverage reporting to Codecov
#
# Triggers:
# - Push to main, develop, feature/* branches
# - Pull requests to main, develop
#
# Zero Mock Policy: All tests use real services via Docker Compose
# =========================================================================

name: Automated Testing

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

  # Allow manual workflow dispatch
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================================
  # Backend Unit Tests (Python 3.11+)
  # =========================================================================
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python 3.11
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      # Install dependencies
      - name: Install Python dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      # Run unit tests with coverage
      - name: Run unit tests with coverage
        run: |
          cd backend
          export PYTHONPATH=$PWD
          pytest tests/unit/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            --tb=short

      # Upload coverage to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend-unit
          name: backend-unit-tests

  # =========================================================================
  # Backend Integration Tests (with Docker services)
  # =========================================================================
  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15.5-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changeme_secure_password
          POSTGRES_DB: sdlc_orchestrator
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: changeme_minio_password
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        volumes:
          - /tmp/minio-data:/data
        command: server /data --console-address ":9001"

      opa:
        image: openpolicyagent/opa:0.58.0
        ports:
          - 8181:8181
        command: run --server --addr=:8181

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python 3.11
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      # Install dependencies
      - name: Install Python dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      # Wait for services to be ready
      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

          echo "Waiting for Redis..."
          for i in {1..30}; do
            if redis-cli -h localhost -p 6379 ping | grep -q PONG; then
              echo "Redis is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

          echo "Waiting for MinIO..."
          for i in {1..30}; do
            if curl -f http://localhost:9000/minio/health/live; then
              echo "MinIO is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

          echo "Waiting for OPA..."
          for i in {1..30}; do
            if curl -f http://localhost:8181/health; then
              echo "OPA is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      # Run database migrations
      - name: Run database migrations
        run: |
          cd backend
          export DATABASE_URL="postgresql://postgres:changeme_secure_password@localhost:5432/sdlc_orchestrator"
          alembic upgrade head

      # Run integration tests with coverage
      - name: Run integration tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:changeme_secure_password@localhost:5432/sdlc_orchestrator
          REDIS_URL: redis://localhost:6379/0
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: changeme_minio_password
          MINIO_SECURE: false
          OPA_URL: http://localhost:8181
          JWT_SECRET_KEY: test_jwt_secret_key_256_bit_random_hex_key123
          JWT_ALGORITHM: HS256
        run: |
          cd backend
          export PYTHONPATH=$PWD
          pytest tests/integration/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            --tb=short

      # Upload coverage to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend-integration
          name: backend-integration-tests

  # =========================================================================
  # Frontend Unit Tests (Vitest)
  # =========================================================================
  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js 20.x
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # Install dependencies
      - name: Install npm dependencies
        run: |
          cd frontend
          npm ci

      # Run unit tests with coverage
      - name: Run unit tests with coverage
        run: |
          cd frontend
          npm run test:unit -- --coverage

      # Upload coverage to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: frontend/coverage/coverage-final.json
          flags: frontend-unit
          name: frontend-unit-tests

  # =========================================================================
  # Frontend E2E Tests (Playwright)
  # =========================================================================
  frontend-e2e-tests:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js 20.x
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # Install dependencies
      - name: Install npm dependencies
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps

      # Start backend services with Docker Compose
      - name: Start backend services
        run: |
          docker-compose up -d postgres redis minio opa backend
          sleep 10

      # Run E2E tests
      - name: Run E2E tests
        run: |
          cd frontend
          npm run test:e2e

      # Upload Playwright report
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      # Stop services
      - name: Stop services
        if: always()
        run: docker-compose down -v

  # =========================================================================
  # Test Summary Report
  # =========================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, frontend-unit-tests, frontend-e2e-tests]
    if: always()

    steps:
      - name: Test Summary Report
        run: |
          echo "=========================================="
          echo "Automated Testing Summary"
          echo "=========================================="
          echo ""
          echo "Backend Unit Tests: ${{ needs.backend-unit-tests.result }}"
          echo "Backend Integration Tests: ${{ needs.backend-integration-tests.result }}"
          echo "Frontend Unit Tests: ${{ needs.frontend-unit-tests.result }}"
          echo "Frontend E2E Tests: ${{ needs.frontend-e2e-tests.result }}"
          echo ""

          if [[ "${{ needs.backend-unit-tests.result }}" == "success" ]] && \
             [[ "${{ needs.backend-integration-tests.result }}" == "success" ]] && \
             [[ "${{ needs.frontend-unit-tests.result }}" == "success" ]] && \
             [[ "${{ needs.frontend-e2e-tests.result }}" == "success" ]]; then
            echo "✅ All tests passed!"
            echo "Coverage reports uploaded to Codecov"
            exit 0
          else
            echo "❌ Some tests failed"
            exit 1
          fi
