# =========================================================================
# GitHub Actions Workflow - Release Management
# SDLC Orchestrator - Stage 04 (SHIP) - Week 9 Day 2
#
# Version: 1.0.0
# Date: December 17, 2025
# Status: ACTIVE - Week 9 Day 2 CI/CD Pipeline
# Authority: DevOps Lead + CTO Approved
# Foundation: semantic-release, GitHub Releases, Changelog
# Framework: SDLC 4.9 Complete Lifecycle
#
# Purpose:
# - Automated semantic versioning (major.minor.patch)
# - Generate changelogs from conventional commits
# - Create GitHub releases with release notes
# - Tag releases in Git
# - Notify team via Slack/email
#
# Triggers:
# - Push to main branch (production releases only)
# - Manual workflow dispatch
#
# Versioning:
# - BREAKING CHANGE: → major (1.0.0 → 2.0.0)
# - feat: → minor (1.0.0 → 1.1.0)
# - fix: → patch (1.0.0 → 1.0.1)
#
# Zero Mock Policy: Production-ready releases only
# =========================================================================

name: Release Management

on:
  push:
    branches:
      - main  # Production releases only

  # Allow manual workflow dispatch
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (major, minor, patch)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel releases

jobs:
  # =========================================================================
  # Create Release
  # =========================================================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      version: ${{ steps.semantic.outputs.new_release_version }}
      published: ${{ steps.semantic.outputs.new_release_published }}

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog
          persist-credentials: false

      # Setup Node.js for semantic-release
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install semantic-release
      - name: Install semantic-release
        run: |
          npm install -g \
            semantic-release@22 \
            @semantic-release/changelog@6 \
            @semantic-release/git@10 \
            @semantic-release/github@9 \
            conventional-changelog-conventionalcommits@7

      # Configure semantic-release
      - name: Configure semantic-release
        run: |
          cat > .releaserc.json <<EOF
          {
            "branches": ["main"],
            "plugins": [
              [
                "@semantic-release/commit-analyzer",
                {
                  "preset": "conventionalcommits",
                  "releaseRules": [
                    {"type": "feat", "release": "minor"},
                    {"type": "fix", "release": "patch"},
                    {"type": "perf", "release": "patch"},
                    {"type": "refactor", "release": "patch"},
                    {"type": "docs", "release": false},
                    {"type": "test", "release": false},
                    {"type": "chore", "release": false"},
                    {"breaking": true, "release": "major"}
                  ]
                }
              ],
              [
                "@semantic-release/release-notes-generator",
                {
                  "preset": "conventionalcommits",
                  "presetConfig": {
                    "types": [
                      {"type": "feat", "section": "✨ Features"},
                      {"type": "fix", "section": "🐛 Bug Fixes"},
                      {"type": "perf", "section": "⚡ Performance"},
                      {"type": "refactor", "section": "♻️ Refactor"},
                      {"type": "docs", "section": "📚 Documentation"},
                      {"type": "test", "section": "✅ Tests"},
                      {"type": "chore", "section": "🔧 Chores"}
                    ]
                  }
                }
              ],
              [
                "@semantic-release/changelog",
                {
                  "changelogFile": "CHANGELOG.md",
                  "changelogTitle": "# Changelog\n\nAll notable changes to SDLC Orchestrator will be documented in this file.\n\nThe format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),\nand this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html)."
                }
              ],
              [
                "@semantic-release/github",
                {
                  "assets": [
                    {"path": "CHANGELOG.md", "label": "Changelog"},
                    {"path": "k8s/base/*.yaml", "label": "Kubernetes Manifests"}
                  ]
                }
              ],
              [
                "@semantic-release/git",
                {
                  "assets": ["CHANGELOG.md", "package.json"],
                  "message": "chore(release): \${nextRelease.version} [skip ci]\n\n\${nextRelease.notes}"
                }
              ]
            ]
          }
          EOF

      # Run semantic-release
      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semantic-release

  # =========================================================================
  # Notify Team
  # =========================================================================
  notify-release:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [create-release]
    if: needs.create-release.outputs.published == 'true'

    steps:
      # Notify via Slack (optional)
      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "🚀 New Release: SDLC Orchestrator v'"$VERSION"'",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 New Release: v'"$VERSION"'"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*SDLC Orchestrator* has been released to production!\n\n*Version:* v'"$VERSION"'\n*GitHub:* <https://github.com/${{ github.repository }}/releases/tag/v'"$VERSION"'|View Release Notes>"
                  }
                }
              ]
            }'

      # Notify via email (optional)
      - name: Notify Email
        if: env.SMTP_SERVER != ''
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          echo "📧 Email notifications would be sent here (SMTP server required)"
          echo "To: $SMTP_TO"
          echo "Subject: SDLC Orchestrator v$VERSION Released"

  # =========================================================================
  # Release Summary
  # =========================================================================
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [create-release, notify-release]
    if: always()

    steps:
      - name: Release Summary Report
        run: |
          echo "=========================================="
          echo "Release Management Summary"
          echo "=========================================="
          echo ""
          echo "Release Created: ${{ needs.create-release.outputs.published }}"
          echo "Version: ${{ needs.create-release.outputs.version }}"
          echo "Notification: ${{ needs.notify-release.result }}"
          echo ""

          if [[ "${{ needs.create-release.outputs.published }}" == "true" ]]; then
            echo "✅ Release v${{ needs.create-release.outputs.version }} published successfully!"
            echo "View release: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }}"
            exit 0
          else
            echo "ℹ️ No new release created (no releasable commits since last release)"
            exit 0
          fi
