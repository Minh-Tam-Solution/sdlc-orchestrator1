# SDLC Orchestrator - Docker Compose
# OSS Stack: OPA + MinIO + Grafana + PostgreSQL (external) + Redis
# Date: 2025-11-13
# Updated: 2025-12-24 - Use postgres-central (external) on port 15432

services:
  # ============================================================================
  # PostgreSQL - Uses postgres-central (shared) on port 15432
  # NOTE: Database must be created in postgres-central:
  #   CREATE DATABASE sdlc_orchestrator;
  #   CREATE USER sdlc_user WITH PASSWORD 'changeme_secure_password';
  #   GRANT ALL PRIVILEGES ON DATABASE sdlc_orchestrator TO sdlc_user;
  # ============================================================================

  # ============================================================================
  # Redis - Caching + Sessions
  # ============================================================================
  redis:
    image: redis:7.2-alpine
    container_name: sdlc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
    ports:
      - "6395:6379"  # IT Admin: SDLC Orchestrator Redis on 6395
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # ============================================================================
  # MinIO - S3-Compatible Object Storage (Evidence Vault)
  # ============================================================================
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: sdlc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_changeme}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9011
    ports:
      - "9010:9000"  # IT Admin: SDLC MinIO API (PORT_ALLOCATION_MANAGEMENT.md)
      - "9011:9001"  # IT Admin: SDLC MinIO Console (PORT_ALLOCATION_MANAGEMENT.md)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: sdlc-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin_changeme};
      /usr/bin/mc mb myminio/evidence-vault --ignore-existing;
      /usr/bin/mc mb myminio/orchdocs --ignore-existing;
      /usr/bin/mc mb myminio/reports --ignore-existing;
      /usr/bin/mc anonymous set download myminio/reports;
      echo 'MinIO buckets initialized successfully';
      "
    networks:
      - sdlc-network

  # ============================================================================
  # Open Policy Agent (OPA) - Gate Engine & Policy Guards
  # Sprint 43: Policy Guards Integration
  # ============================================================================
  opa:
    image: openpolicyagent/opa:0.58.0
    platform: linux/amd64
    container_name: sdlc-opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--log-format=json"
      - "--diagnostic-addr=0.0.0.0:8282"
    ports:
      - "8185:8181"  # IT Admin: SDLC OPA on 8185
    volumes:
      - ./backend/policy-packs/rego:/policies:ro
    healthcheck:
      # OPA diagnostic endpoint provides health status
      test: ["CMD", "/opa", "eval", "true"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sdlc-network

  # ============================================================================
  # Prometheus - Metrics Collection
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: sdlc-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9096:9090"  # Use 9096 to avoid conflict with kafka-ui (9090) and kafka (9092-9093)
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # ============================================================================
  # Grafana - Dashboards + Visualization
  # ============================================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: sdlc-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin_changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_INSTALL_PLUGINS: grafana-oncall-app
    ports:
      - "3002:3000"  # IT Admin: SDLC Grafana (3001 used by bflow-staging-grafana)
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./infrastructure/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # ============================================================================
  # Alertmanager - Alert Routing
  # ============================================================================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: sdlc-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9095:9093"  # Use 9095 to avoid conflict with Kafka on 9093
    volumes:
      - ./infrastructure/monitoring/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # ============================================================================
  # React Frontend - SDLC Orchestrator Platform Admin Dashboard
  # Main application dashboard (Projects, Gates, Evidence, Policies, etc.)
  # ============================================================================
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: sdlc-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: https://sdlc.nhatquangholding.com/api/v1
    ports:
      - "8310:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sdlc-network

  # ============================================================================
  # Next.js Frontend - SDLC Orchestrator Landing Page
  # Marketing site with OAuth login, registration, docs, checkout
  # ============================================================================
  frontend-landing:
    build:
      context: ./frontend/landing
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://sdlc.nhatquangholding.com/api/v1
    container_name: sdlc-frontend-landing
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://sdlc.nhatquangholding.com/api/v1
    ports:
      - "8311:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Use node-based healthcheck since alpine image doesn't have curl/wget
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sdlc-network

  # ============================================================================
  # FastAPI Backend - SDLC Orchestrator API
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sdlc-backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8300 --reload
    environment:
      # Database - Uses postgres-central (external container on ai-net)
      DATABASE_URL: postgresql+asyncpg://sdlc_user:${POSTGRES_PASSWORD:-changeme_secure_password}@postgres-central:5432/sdlc_orchestrator

      # JWT (SECRET_KEY is the canonical config key per config.py)
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-minimum-32-characters-long}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production-minimum-32-characters-long}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 30

      # MinIO S3
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_changeme}
      MINIO_BUCKET: evidence-vault
      MINIO_SECURE: "false"

      # OPA
      OPA_URL: http://opa:8181

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis_password}@redis:6379/0

      # App
      ENVIRONMENT: development
      DEBUG: "true"
      ALLOWED_ORIGINS: https://sdlc.nhatquangholding.com,http://localhost:8310,http://localhost:3000,http://localhost:4000,http://localhost:5173

      # Codegen Service (Sprint 45 - EP-06)
      # GPU Server: Use http://ollama:11434 to access Ollama container via ai-net network
      CODEGEN_OLLAMA_URL: ${CODEGEN_OLLAMA_URL:-http://ollama:11434}
      CODEGEN_MODEL_PRIMARY: ${CODEGEN_MODEL_PRIMARY:-qwen3-coder:30b}
      CODEGEN_MODEL_FAST: ${CODEGEN_MODEL_FAST:-qwen3:14b}
      CODEGEN_TIMEOUT: ${CODEGEN_TIMEOUT:-120}

      # GitHub OAuth (Sprint 15)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-Ov23li0mfFERLtQgdEeI}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-cc9580b02bcccc773d5d23b07b0c4a983a9c0bc5}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}

      # Google OAuth (Sprint 60)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-296085116048-u2iqm0ukdd8kbg319gj2foog04qn681c.apps.googleusercontent.com}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-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}

      # OAuth Redirect URLs (Production)
      OAUTH_REDIRECT_URL: https://sdlc.nhatquangholding.com/auth/callback
      GITHUB_OAUTH_REDIRECT_URL: https://sdlc.nhatquangholding.com/auth/github/callback
      GOOGLE_OAUTH_REDIRECT_URL: https://sdlc.nhatquangholding.com/auth/callback
      VNPAY_RETURN_URL: https://sdlc.nhatquangholding.com/checkout/success

      # SMTP Email Configuration (Sprint 60 - Password Reset)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@sdlc-orchestrator.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-SDLC Orchestrator}

    ports:
      - "8300:8300"
    volumes:
      - ./backend:/app
      - ./docs:/docs:ro  # Mount docs directory as read-only for user support documentation
      - backend_cache:/app/.pytest_cache
    depends_on:
      minio:
        condition: service_healthy
      opa:
        condition: service_started
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8300/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - sdlc-network
      - ai-net

# ============================================================================
# Volumes
# ============================================================================
volumes:
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
  backend_cache:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  sdlc-network:
    driver: bridge
  ai-net:
    external: true
