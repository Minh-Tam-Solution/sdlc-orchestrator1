# SDLC Orchestrator - Docker Compose
# OSS Stack: OPA + MinIO + Grafana + PostgreSQL + Redis
# Date: 2025-11-13

version: '3.9'

services:
  # ============================================================================
  # PostgreSQL - Primary Database
  # ============================================================================
  postgres:
    image: postgres:15.5-alpine
    container_name: sdlc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sdlc_orchestrator
      POSTGRES_USER: sdlc_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5450:5432"  # IT Admin: SDLC PostgreSQL (PORT_ALLOCATION_MANAGEMENT.md)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdlc_user -d sdlc_orchestrator"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # ============================================================================
  # Redis - Caching + Sessions
  # ============================================================================
  redis:
    image: redis:7.2-alpine
    container_name: sdlc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
    ports:
      - "6395:6379"  # IT Admin: SDLC Orchestrator Redis on 6395
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # ============================================================================
  # MinIO - S3-Compatible Object Storage (Evidence Vault)
  # ============================================================================
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: sdlc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_changeme}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9011
    ports:
      - "9010:9000"  # IT Admin: SDLC MinIO API (PORT_ALLOCATION_MANAGEMENT.md)
      - "9011:9001"  # IT Admin: SDLC MinIO Console (PORT_ALLOCATION_MANAGEMENT.md)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: sdlc-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin_changeme};
      /usr/bin/mc mb myminio/evidence-vault --ignore-existing;
      /usr/bin/mc mb myminio/orchdocs --ignore-existing;
      /usr/bin/mc mb myminio/reports --ignore-existing;
      /usr/bin/mc anonymous set download myminio/reports;
      echo 'MinIO buckets initialized successfully';
      "
    networks:
      - sdlc-network

  # ============================================================================
  # Open Policy Agent (OPA) - Gate Engine & Policy Guards
  # Sprint 43: Policy Guards Integration
  # ============================================================================
  opa:
    image: openpolicyagent/opa:0.58.0
    platform: linux/amd64
    container_name: sdlc-opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--log-format=json"
    ports:
      - "8185:8181"  # IT Admin: SDLC OPA on 8185
    volumes:
      - ./backend/policy-packs/rego:/policies:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sdlc-network

  # ============================================================================
  # Prometheus - Metrics Collection
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: sdlc-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9096:9090"  # Use 9096 to avoid conflict with kafka-ui (9090) and kafka (9092-9093)
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # ============================================================================
  # Grafana - Dashboards + Visualization
  # ============================================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: sdlc-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin_changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_INSTALL_PLUGINS: grafana-oncall-app
    ports:
      - "3002:3000"  # IT Admin: SDLC Grafana (3001 used by bflow-staging-grafana)
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./infrastructure/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # ============================================================================
  # Alertmanager - Alert Routing
  # ============================================================================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: sdlc-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9095:9093"  # Use 9095 to avoid conflict with Kafka on 9093
    volumes:
      - ./infrastructure/monitoring/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # ============================================================================
  # React Frontend - SDLC Orchestrator Web UI
  # ============================================================================
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: sdlc-frontend
    restart: unless-stopped
    ports:
      - "8310:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sdlc-network

  # ============================================================================
  # FastAPI Backend - SDLC Orchestrator API
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sdlc-backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8300 --reload
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://sdlc_user:${POSTGRES_PASSWORD:-changeme_secure_password}@postgres:5432/sdlc_orchestrator

      # JWT (SECRET_KEY is the canonical config key per config.py)
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-minimum-32-characters-long}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production-minimum-32-characters-long}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 30

      # MinIO S3
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_changeme}
      MINIO_BUCKET: evidence-vault
      MINIO_SECURE: "false"

      # OPA
      OPA_URL: http://opa:8181

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis_password}@redis:6379/0

      # App
      ENVIRONMENT: development
      DEBUG: "true"
      ALLOWED_ORIGINS: https://sdlc.nhatquangholding.com,http://localhost:8310,http://localhost:3000,http://localhost:4000,http://localhost:5173

      # Codegen Service (Sprint 45 - EP-06)
      # GPU Server: Use http://host.docker.internal:11434 to access Ollama from container
      CODEGEN_OLLAMA_URL: ${CODEGEN_OLLAMA_URL:-http://host.docker.internal:11434}
      CODEGEN_MODEL_PRIMARY: ${CODEGEN_MODEL_PRIMARY:-qwen2.5-coder:32b-instruct-q4_K_M}
      CODEGEN_MODEL_FAST: ${CODEGEN_MODEL_FAST:-qwen2.5:14b-instruct}
      CODEGEN_TIMEOUT: ${CODEGEN_TIMEOUT:-120}

      # GitHub OAuth (Sprint 15)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}

    ports:
      - "8300:8300"
    volumes:
      - ./backend:/app
      - ./docs:/docs:ro  # Mount docs directory as read-only for user support documentation
      - backend_cache:/app/.pytest_cache
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      opa:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8300/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - sdlc-network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
  backend_cache:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  sdlc-network:
    driver: bridge
