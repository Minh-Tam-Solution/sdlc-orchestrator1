[pytest]
# Pytest configuration for SDLC Orchestrator
# Week 6 Day 1 - Integration Testing Infrastructure

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories
testpaths = tests

# Options
addopts =
    -v
    --strict-markers
    --tb=short
    --asyncio-mode=auto
    --cov=backend/app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=90
    -p no:warnings

# Markers
markers =
    asyncio: Async test cases
    integration: Integration tests (real services)
    unit: Unit tests (mocked dependencies)
    slow: Slow running tests
    auth: Authentication tests
    gates: Gates API tests
    evidence: Evidence API tests
    policies: Policies API tests
    minio: MinIO storage integration tests
    opa: OPA policy evaluation integration tests
    smoke: Smoke tests (critical paths only)
    github: GitHub OAuth integration tests

# Asyncio mode
asyncio_mode = auto

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test execution settings
timeout = 300
timeout_method = thread

# Coverage options
[coverage:run]
source = backend/app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
