# SDLC Orchestrator - NGINX Reverse Proxy Configuration
#
# Domain: sdlc.nhatquangholding.com
# Access: NAT from router (port 80, 443) to internal server (192.168.1.2)
# Note: Not using Cloudflare - direct NAT routing
#
# SDLC Stage: 06 - DEPLOY
# Sprint: 64 - ADR-025 Migration Complete (Unified Next.js Frontend)
# Framework: SDLC 5.1.3
#
# Reference: /home/nqh/shared/models/docs/admin/PORT_ALLOCATION_MANAGEMENT.md
#
# Architecture:
#   Internet → Router (NAT 80,443) → 192.168.1.2 (NGINX) → Docker containers
#
# Port Allocation (per IT Admin PORT_ALLOCATION_MANAGEMENT.md):
#   - Frontend:   localhost:8310 (Next.js Unified - Landing + App)
#   - Backend:    localhost:8300 (FastAPI API)
#   - PostgreSQL: localhost:5451 (Database - internal only)
#   - Redis:      localhost:6395 (Cache - internal only)
#   - MinIO:      localhost:9020 (S3 API via ai-platform)
#   - OPA:        localhost:8185 (Policy Engine - internal only)
#   - Grafana:    localhost:3002 (Monitoring Dashboards)
#   - Prometheus: localhost:9096 (Metrics - internal only)
#
# SSL: Let's Encrypt via certbot
#
# Installation:
#   1. Copy to /etc/nginx/sites-available/sdlc.nhatquangholding.com
#   2. ln -s /etc/nginx/sites-available/sdlc.nhatquangholding.com /etc/nginx/sites-enabled/
#   3. certbot --nginx -d sdlc.nhatquangholding.com
#   4. nginx -t && systemctl reload nginx

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=sdlc_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=sdlc_login:10m rate=5r/m;

# Upstream definitions
upstream sdlc_frontend {
    # Next.js Unified Frontend (ADR-025 Migration Complete)
    # Serves all routes: Landing, Auth, App, Admin, Docs
    # Sprint 64: Vite Dashboard deprecated, fully migrated to Next.js
    server 127.0.0.1:8310;
    keepalive 32;
}

upstream sdlc_backend {
    server 127.0.0.1:8300;
    keepalive 32;
}

upstream sdlc_grafana {
    server 127.0.0.1:3002;
    keepalive 8;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name sdlc.nhatquangholding.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sdlc.nhatquangholding.com;

    # SSL certificates (wildcard cert for *.nhatquangholding.com)
    ssl_certificate /etc/letsencrypt/live/nhatquangholding.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nhatquangholding.com/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://sdlc.nhatquangholding.com wss://sdlc.nhatquangholding.com;" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/rss+xml image/svg+xml;
    gzip_comp_level 6;

    # Client settings
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # Logging
    access_log /var/log/nginx/sdlc.nhatquangholding.com.access.log;
    error_log /var/log/nginx/sdlc.nhatquangholding.com.error.log;

    # ==========================================================================
    # API Routes (Backend - FastAPI)
    # ==========================================================================
    location /api/ {
        # Rate limiting
        limit_req zone=sdlc_api burst=50 nodelay;

        # Proxy to backend
        proxy_pass http://sdlc_backend/api/;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Login rate limiting (stricter)
    location /api/v1/auth/login {
        limit_req zone=sdlc_login burst=3 nodelay;

        proxy_pass http://sdlc_backend/api/v1/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================================
    # Grafana Dashboard (embed via iframe or direct access)
    # ==========================================================================
    location /grafana/ {
        # Only allow authenticated users (check via API)
        # For now, allow all - implement auth check later

        proxy_pass http://sdlc_grafana/;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket for live updates
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
    }

    # ==========================================================================
    # Health Check Endpoints
    # ==========================================================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /api/health {
        proxy_pass http://sdlc_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        access_log off;
    }

    # ==========================================================================
    # Frontend Routes (Next.js Unified - port 8310)
    # All routes: Landing, Auth, App, Admin, Docs, Checkout
    # ==========================================================================

    # OAuth callback routes - MUST go to Landing page
    location /auth/ {
        proxy_pass http://sdlc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Login, Register, Password reset
    location /login {
        proxy_pass http://sdlc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /register {
        proxy_pass http://sdlc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /forgot-password {
        proxy_pass http://sdlc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Sprint 60: Password Reset page
    location /reset-password {
        proxy_pass http://sdlc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Documentation pages
    location /docs {
        proxy_pass http://sdlc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Checkout and payment pages
    location /checkout {
        proxy_pass http://sdlc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Demo page
    location /demo {
        proxy_pass http://sdlc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Marketplace page (Sprint 60)
    location /marketplace {
        proxy_pass http://sdlc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # App routes (authenticated dashboard)
    location /app {
        proxy_pass http://sdlc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js handles routing internally
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Admin routes (superuser only)
    location /admin {
        proxy_pass http://sdlc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ==========================================================================
    # Static Assets (Next.js)
    # ==========================================================================

    # Next.js static files (_next folder)
    location /_next/ {
        proxy_pass http://sdlc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;

        # Cache static assets
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Generic static files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        proxy_pass http://sdlc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;

        # Cache static assets
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==========================================================================
    # Default: All other routes to Next.js
    # Next.js handles all routing internally (catch-all)
    # ==========================================================================
    location / {
        proxy_pass http://sdlc_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================================
    # Security: Block sensitive paths
    # ==========================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(\.git|\.env|\.htaccess|docker-compose) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
