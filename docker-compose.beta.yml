# SDLC Orchestrator - Beta Environment (Production-like)
# OSS Stack: OPA + MinIO + Grafana + PostgreSQL + Redis
# Date: 2025-12-16 (Sprint 33 Day 3)
# Purpose: External beta testing with Cloudflare Tunnel access

version: '3.9'

services:
  # ============================================================================
  # PostgreSQL - Primary Database
  # ============================================================================
  postgres:
    image: postgres:15.5-alpine
    container_name: sdlc-beta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sdlc_orchestrator
      POSTGRES_USER: sdlc_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5435:5432"  # BETA: Use 5435 (5433 has persistent binding issue)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdlc_user -d sdlc_orchestrator"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # ============================================================================
  # Redis - Caching + Sessions
  # ============================================================================
  redis:
    image: redis:7.2-alpine
    container_name: sdlc-beta-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6383:6379"  # BETA: Use 6383 (6380 is n8n-redis, 6381 is bflow, 6382 is production)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # ============================================================================
  # MinIO - S3-Compatible Object Storage (Evidence Vault)
  # ============================================================================
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: sdlc-beta-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    ports:
      - "9002:9000"  # BETA: S3 API on 9002
      - "9003:9001"  # BETA: Web Console on 9003
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: sdlc-beta-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/evidence-vault --ignore-existing;
      /usr/bin/mc mb myminio/orchdocs --ignore-existing;
      /usr/bin/mc mb myminio/reports --ignore-existing;
      /usr/bin/mc anonymous set download myminio/reports;
      echo 'MinIO buckets initialized successfully';
      "
    networks:
      - sdlc-network

  # ============================================================================
  # Open Policy Agent (OPA) - Gate Engine
  # ============================================================================
  opa:
    image: openpolicyagent/opa:0.58.0
    platform: linux/amd64
    container_name: sdlc-beta-opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
    ports:
      - "8182:8181"  # BETA: Use 8182 to avoid conflict with production 8181
    volumes:
      - ./policy-packs/rego:/policies:ro
    healthcheck:
      disable: true
    networks:
      - sdlc-network

  # ============================================================================
  # Prometheus - Metrics Collection
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: sdlc-beta-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9091:9090"  # BETA: Use 9091 to avoid conflict with production 9090
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # ============================================================================
  # Grafana - Dashboards + Visualization
  # ============================================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: sdlc-beta-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_INSTALL_PLUGINS: grafana-oncall-app
    ports:
      - "3002:3000"  # BETA: Use 3002 to avoid conflict with production 3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./infrastructure/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # ============================================================================
  # Alertmanager - Alert Routing (PORT REMAPPED: 9093→9094 to avoid conflict)
  # ============================================================================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: sdlc-beta-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9100:9093"  # BETA: Use 9100 (9099 is Sentry)
    volumes:
      - ./infrastructure/monitoring/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  # ============================================================================
  # Next.js Unified Frontend - SDLC Orchestrator Web UI (ADR-025)
  # ============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8300/api/v1}
    container_name: sdlc-beta-frontend
    restart: unless-stopped
    ports:
      - "8311:3000"  # BETA: Use 8311 to avoid conflict with production 8310
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8300/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sdlc-network

  # ============================================================================
  # FastAPI Backend - SDLC Orchestrator API
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sdlc-beta-backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://sdlc_user:${POSTGRES_PASSWORD}@postgres:5432/sdlc_orchestrator

      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 30

      # MinIO S3
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: evidence-vault
      MINIO_SECURE: "false"

      # OPA (internal Docker network uses container port, not host port)
      OPA_URL: http://opa:8181

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

      # App
      ENVIRONMENT: beta
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: https://sdlc.nqh.vn,http://localhost:8311

    ports:
      - "8001:8000"  # BETA: Use 8001 to avoid conflict with production 8000
    volumes:
      - ./backend:/app
      - backend_cache:/app/.pytest_cache
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      opa:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - sdlc-network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
  backend_cache:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  sdlc-network:
    name: sdlc-beta-network  # BETA: Use unique network name to avoid conflict with production
    driver: bridge
